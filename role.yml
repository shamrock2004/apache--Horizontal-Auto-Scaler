kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: apache-manager
  namespace: apache
rules:
  - apiGroups: ["","apps","rbac.authorization.k8s.io","batch","autoscaling"]
    resources: ["pods","deployments","services","horizontalpodautoscalers"]
    verbs: ["gest","apply","watch","create","patch","delete"]

